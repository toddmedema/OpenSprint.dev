<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <script src="/theme-init.js"></script>
    <style>
      html {
        background-color: #f5f5f7;
        color: #1d1d1f;
        color-scheme: light;
      }

      html[data-theme="dark"] {
        background-color: #111215;
        color: #f5f5f7;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background-color: inherit;
        color: inherit;
      }

      #app-boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        animation: boot-loader-in 0.5s ease-out both;
        pointer-events: none;
      }
      @keyframes boot-loader-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      #app-boot-loader .bl-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      #app-boot-loader .bl-logo {
        width: 56px;
        height: 56px;
        filter: drop-shadow(0 0 10px rgba(99,102,241,0.25));
        animation: bl-pulse 3.6s ease-in-out infinite;
      }
      @keyframes bl-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      #app-boot-loader .bl-spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        animation: bl-spin 0.8s linear infinite;
      }
      html:not([data-theme="dark"]) #app-boot-loader .bl-spinner {
        border: 2px solid rgba(0,0,0,0.08);
        border-top-color: #4f46e5;
      }
      html[data-theme="dark"] #app-boot-loader .bl-spinner {
        border: 2px solid rgba(100,116,139,0.3);
        border-top-color: #818cf8;
      }
      @keyframes bl-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan like a Product Manager. Ship at the speed of thought." />
    <meta property="og:title" content="Open Sprint" />
    <meta
      property="og:description"
      content="Plan like a Product Manager. Ship at the speed of thought."
    />
    <meta property="og:site_name" content="Open Sprint" />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Open Sprint" />
    <meta
      name="twitter:description"
      content="Plan like a Product Manager. Ship at the speed of thought."
    />
    <meta name="twitter:image" content="/og-image.png" />
    <title>Open Sprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full">
    <div id="root" class="h-full">
      <div id="app-boot-loader" aria-hidden="true">
        <div class="bl-inner">
          <svg class="bl-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" aria-hidden="true">
            <polygon points="4,10 36,40 4,70" fill="#c7d2fe" />
            <polygon points="22,10 54,40 22,70" fill="#818cf8" />
            <polygon points="40,10 72,40 40,70" fill="#4f46e5" />
          </svg>
          <div class="bl-spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
