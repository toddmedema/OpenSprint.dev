name: Merge gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  quality-gates:
    name: "${{ matrix.gate }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        gate: [build, lint, test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensprint
          POSTGRES_PASSWORD: opensprint
          POSTGRES_DB: opensprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "sh -c \"PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c 'SELECT 1' || exit 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify desktop artifact names (fixed for permalinks)
        if: matrix.gate == 'build'
        run: npm run verify:desktop-artifacts
      - name: Run gate
        if: matrix.gate != 'test'
        run: npm run ${{ matrix.gate }}
      # Test gate runs tests with coverage; thresholds are enforced (Vitest exits non-zero if unmet).
      # Backend: 80% stmts/lines/fns, 70% branches. Frontend: 80% stmts/lines, 70% branches, 73% functions (SPEC >80%). Job fails if any workspace is below threshold.
      # Frontend run includes E2E tests (*.e2e.test.tsx). Step is bounded (20m) so the gate cannot hang.
      - name: Run tests with coverage (enforce thresholds)
        if: matrix.gate == 'test'
        run: |
          set -e
          mkdir -p artifacts/test-results

          timeout 20m bash -c '
            for workspace in shared backend frontend; do
              npm run test:coverage -w packages/$workspace -- \
                --reporter=default \
                --reporter=junit \
                --reporter=json \
                --outputFile.junit=../../artifacts/test-results/$workspace-junit.xml \
                --outputFile.json=../../artifacts/test-results/$workspace-results.json
            done
          '
      - name: Upload test reports
        if: always() && matrix.gate == 'test'
        uses: actions/upload-artifact@v6
        with:
          name: merge-gate-test-reports-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: artifacts/test-results/
          if-no-files-found: warn
          retention-days: 14

  perf:
    name: perf
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensprint
          POSTGRES_PASSWORD: opensprint
          POSTGRES_DB: opensprint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "sh -c \"PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c 'SELECT 1' || exit 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run perf check (start backend + frontend, then perf:ci)
        env:
          DATABASE_URL: postgres://opensprint:opensprint@localhost:5432/opensprint
        run: |
          npm run start -w packages/backend &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/health >/dev/null 2>&1; then break; fi
            if [ $i -eq 30 ]; then echo "Backend health check timeout"; exit 1; fi
            sleep 1
          done
          npm run dev -w packages/frontend &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ >/dev/null 2>&1; then break; fi
            if [ $i -eq 30 ]; then echo "Frontend health check timeout"; exit 1; fi
            sleep 1
          done
          npm run perf:ci
