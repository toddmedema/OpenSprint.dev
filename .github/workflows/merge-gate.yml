name: Merge gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  quality-gates:
    name: "${{ matrix.gate }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        gate: [build, lint, test]
    # Postgres sidecar: keep image/env/health options aligned with merge-gate perf and
    # release-desktop perf-check (see scripts/ci/wait-for-tcp.mjs + run-perf-stack.sh).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensprint
          POSTGRES_PASSWORD: opensprint
          POSTGRES_DB: opensprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "sh -c \"PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c 'SELECT 1' || exit 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Fetch PR base for affected workspace detection
        if: matrix.gate == 'test' && github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
      - name: Determine affected test workspaces
        if: matrix.gate == 'test'
        id: affected_tests
        run: |
          mkdir -p artifacts/test-results
          if [ "${{ github.event_name }}" = "push" ]; then
            export OPENSPRINT_AFFECTED_ALL=1
          fi

          node scripts/affected-workspaces.mjs --coverage-only --json > artifacts/test-results/affected-workspaces.json
          WORKSPACES="$(node -e 'const fs = require("fs"); const data = JSON.parse(fs.readFileSync("artifacts/test-results/affected-workspaces.json", "utf8")); process.stdout.write((data.workspaces || []).join(","));')"
          echo "workspaces=$WORKSPACES" >> "$GITHUB_OUTPUT"
      - name: Wait for Postgres TCP (belt-and-suspenders with service health)
        if: matrix.gate == 'test'
        run: node scripts/ci/wait-for-tcp.mjs 127.0.0.1 5432 60
      - name: Verify desktop artifact names (fixed for permalinks)
        if: matrix.gate == 'build'
        run: npm run verify:desktop-artifacts
      - name: Verify electron-builder always disables publish in CI scripts
        if: matrix.gate == 'build'
        run: npm run verify:electron-builder-publish
      - name: Run gate
        if: matrix.gate != 'test'
        run: npm run ${{ matrix.gate }}
      # Test gate runs tests with coverage; thresholds are enforced (Vitest exits non-zero if unmet).
      # Backend: 80% stmts/lines/fns, 70% branches. Frontend: 80% stmts/lines, 70% branches, 73% functions (SPEC >80%). Job fails if any workspace is below threshold.
      # Frontend run includes E2E tests (*.e2e.test.tsx). Step is bounded (20m) so the gate cannot hang.
      - name: Run shared tests with coverage
        if: matrix.gate == 'test' && contains(steps.affected_tests.outputs.workspaces, 'shared')
        run: |
          timeout 20m npm run test:coverage -w packages/shared -- \
            --reporter=default \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=../../artifacts/test-results/shared-junit.xml \
            --outputFile.json=../../artifacts/test-results/shared-results.json
      - name: Run backend tests with coverage
        if: matrix.gate == 'test' && contains(steps.affected_tests.outputs.workspaces, 'backend')
        run: |
          timeout 20m npm run test:coverage -w packages/backend -- \
            --reporter=default \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=../../artifacts/test-results/backend-junit.xml \
            --outputFile.json=../../artifacts/test-results/backend-results.json
      - name: Run frontend tests with coverage
        if: matrix.gate == 'test' && contains(steps.affected_tests.outputs.workspaces, 'frontend')
        run: |
          timeout 20m npm run test:coverage -w packages/frontend -- \
            --reporter=default \
            --reporter=junit \
            --reporter=json \
            --outputFile.junit=../../artifacts/test-results/frontend-junit.xml \
            --outputFile.json=../../artifacts/test-results/frontend-results.json
      - name: Upload test reports
        if: always() && matrix.gate == 'test'
        uses: actions/upload-artifact@v6
        with:
          name: merge-gate-test-reports-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: artifacts/test-results/
          if-no-files-found: warn
          retention-days: 14

  perf:
    name: perf
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Postgres: POSTGRES_DB must match DATABASE_URL database name below (opensprint_test).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensprint
          POSTGRES_PASSWORD: opensprint
          POSTGRES_DB: opensprint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "sh -c \"PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c 'SELECT 1' || exit 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run perf check (start backend + frontend, then perf:ci)
        env:
          DATABASE_URL: postgres://opensprint:opensprint@localhost:5432/opensprint_test
          NODE_ENV: test
        run: bash scripts/ci/run-perf-stack.sh
