name: Merge gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: merge-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: "${{ matrix.gate }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        gate: [build, lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run gate
        run: npm run ${{ matrix.gate }}
