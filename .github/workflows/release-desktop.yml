# Desktop release. Artifacts use fixed names (Open.Sprint-${arch}.${ext}) so
# permalinks like .../releases/latest/download/Open.Sprint-x64.exe always serve the latest build.
name: Release desktop

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            Desktop release. Download the DMG (macOS), Windows installer (exe), or AppImage (Linux) below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Set version from tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: node scripts/set-version-from-tag.js
      - run: npm ci
      - run: npm run build
      - run: npm run build:mac -w packages/electron
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/electron/dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Set version from tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: node scripts/set-version-from-tag.js
      - run: npm ci
      - run: npm run build
      - run: npm run build:win:x64 -w packages/electron
      - run: npm run build:win:arm64 -w packages/electron
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/electron/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Set version from tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: node scripts/set-version-from-tag.js
      - run: npm ci
      - run: npm run build
      - run: npm run build:linux -w packages/electron
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packages/electron/dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  perf-check:
    name: perf
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opensprint
          POSTGRES_PASSWORD: opensprint
          POSTGRES_DB: opensprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd "sh -c \"PGPASSWORD=$POSTGRES_PASSWORD psql -U $POSTGRES_USER -d $POSTGRES_DB -c 'SELECT 1' || exit 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - name: Set version from tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: node scripts/set-version-from-tag.js
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run perf check (start backend + frontend, then perf:ci)
        env:
          DATABASE_URL: postgres://opensprint:opensprint@localhost:5432/opensprint
        run: |
          npm run start -w packages/backend &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/health >/dev/null 2>&1; then break; fi
            if [ $i -eq 30 ]; then echo "Backend health check timeout"; exit 1; fi
            sleep 1
          done
          npm run dev -w packages/frontend &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ >/dev/null 2>&1; then break; fi
            if [ $i -eq 30 ]; then echo "Frontend health check timeout"; exit 1; fi
            sleep 1
          done
          npm run perf:ci
